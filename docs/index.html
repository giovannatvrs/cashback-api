<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Consulta de Cashback</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="notif"></div>
    <header>
        <div>
            <h1>Consulta de Cashback</h1>
        </div>
        
    </header>
    <main>
        <div class="main-container">
            <form id="form-cashback">
                <div class="fields">
                    <div class="form-control">
                        <label for="valor-compra">Valor da compra:</label>
                        <div class="input-box">
                            <span class="prefix">R$</span>
                            <input type="text" inputmode="decimal" placeholder="10.00" id="valor-compra" required>
                        </div>
                    </div>
                
                    <div class="form-control">
                        <label for="tipo-cliente">Tipo de Cliente:</label>
                        <select id="tipo-cliente" required>
                            <option value="Comum">Comum</option>
                            <option value="VIP">VIP</option>
                        </select>
                    </div>
                
                    <div class="form-control">
                        <label for="percentual-desconto">Desconto:</label>
                        <div class="input-box">
                            <input type="text" id="percentual-desconto" inputmode="decimal" placeholder="10">
                            <span class="sufix">%</span>
                        </div>
                    </div>
                </div>
                <div class="form-button">
                    <button type="submit" id="submit-button">Consultar</button>
                </div>

                <div id="resultado"></div>
            </form>
            <table id="tabela-consultas">
                <thead>
                    <tr>
                        <th class="texto">Tipo de Cliente</th>
                        <th>Valor da Compra</th>
                        <th>Valor Final</th>
                        <th>Cashback</th>
                        <th class="data">Data da Consulta</th>
                    </tr>
                </thead>
                <tbody>
                    
                </tbody>
            </table>
        </div>
    </main>
    <script src="./js/script.js"></script>
</body>
</html>
